services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-handoverkey_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - handoverkey-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - handoverkey-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      API_PORT: 3001
      # Database connection
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-handoverkey_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Redis connection
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # App secrets
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_jwt_secret_please_replace_32_chars}
      ACTIVITY_HMAC_SECRET: ${ACTIVITY_HMAC_SECRET:-changeme_dev_activity_secret_please_replace}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Web URL for CORS and emails
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      JOB_CONCURRENCY: ${JOB_CONCURRENCY:-5}
      TWO_FACTOR_ISSUER: ${TWO_FACTOR_ISSUER:-HandoverKey}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - handoverkey-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Pass API and WebSocket URLs to build time for Vite
        VITE_API_URL: http://localhost:3001/api/v1
        VITE_WS_URL: ws://localhost:3001/ws
    ports:
      - "3000:3000"
    networks:
      - handoverkey-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:


networks:
  handoverkey-network:
    driver: bridge
