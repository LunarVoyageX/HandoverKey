name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: Describe the problem or limitation you're facing
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: Describe your proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Have you considered other approaches?
      placeholder: Describe alternative solutions you've considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Roadmap fit
      description: How does this fit the current product and roadmap?
      options:
        - label: This improves the current shipped product surface
        - label: This is a longer-term roadmap item
        - label: I'm not sure where this fits yet
