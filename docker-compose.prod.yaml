services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - handoverkey-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3011:3001"
    environment:
      NODE_ENV: production
      API_PORT: 3001
      # Database connection - PROVIDE THESE IN YOUR PRODUCTION ENV
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis connection - connects to the redis service defined above
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # App secrets
      JWT_SECRET: ${JWT_SECRET}
      ACTIVITY_HMAC_SECRET: ${ACTIVITY_HMAC_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Web URL
      FRONTEND_URL: ${FRONTEND_URL:-https://handoverkey.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://handoverkey.com}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      JOB_CONCURRENCY: ${JOB_CONCURRENCY:-5}
      TWO_FACTOR_ISSUER: ${TWO_FACTOR_ISSUER:-HandoverKey}
      GRACE_PERIOD_HOURS: ${GRACE_PERIOD_HOURS:-48}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - handoverkey-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Pass API and WebSocket URLs to build time
        VITE_API_URL: ${VITE_API_URL:-https://api.handoverkey.com/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-wss://api.handoverkey.com/ws}
    ports:
      - "3010:3000"
    networks:
      - handoverkey-network
    restart: unless-stopped

volumes:
  redis_data:


networks:
  handoverkey-network:
    driver: bridge
